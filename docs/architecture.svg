  <rect x="190" y="458" width="10" height="10" fill="#160e2a" stroke="#cba6f7" stroke-width="1.5" rx="2"/>
  <text x="206" y="468" fill="#a6adc8" font-family="'Segoe UI',system-ui,sans-serif" font-size="10">基礎</text>

  <!-- dashed = indirect -->
